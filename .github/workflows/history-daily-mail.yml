name: Generate and Mail Daily History

on:
  schedule:
    # 北京时间 21:30 = UTC 13:30
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  history-daily-mail:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate next-day history markdown
        run: npm run history:generate

      - name: Send history mail
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          HISTORY_MAIL_TO: ${{ secrets.HISTORY_MAIL_TO }}
          HISTORY_MAIL_FROM: ${{ secrets.HISTORY_MAIL_FROM }}
          HISTORY_MAIL_SUBJECT_PREFIX: ${{ secrets.HISTORY_MAIL_SUBJECT_PREFIX }}
        run: npm run history:send-mail
